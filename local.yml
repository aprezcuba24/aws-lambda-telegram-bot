name: aws-lambda-telegram-bot-local

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
    ports:
      - "8001:8001"
    depends_on:
      - dynamodb-local

  app: &app
    user: vscode
    build:
      context: .
      dockerfile: ./compose/local/app/Dockerfile
    image: base_aws_bot_bot
    volumes:
      - .:/app
    env_file:
      - ./.envs/.local/.app
    working_dir: /app
    command: sleep infinity
    depends_on:
      - dynamodb-local
